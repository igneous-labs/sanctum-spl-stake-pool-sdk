services:
  validator:
    image: docker.io/sanctumso/solana-test-validator:3.1.1
    security_opt:
      # insecure, needed for io_uring, else validator will fail with no stdout
      - seccomp:unconfined
    command: [
        "solana-test-validator",
        # Reset
        "-r",
        # Warp to middle of epoch 1
        "-w",
        "648000",
        # Accounts
        "--account-dir",
        "/test-fixtures",
        # Programs
        "--bpf-program",
        "SP12tWFxD9oJsVWNavTTBZvMbA6gkAmxtVgxdqvyvhY",
        "/test-fixtures/programs/stake-pool.so",

        "--bpf-program",
        "SPMBzsVUuoHA4Jm6KunbsotaahvVikZs1JyTW6iJvbn",
        "/test-fixtures/programs/stake-pool.so",

        "--bpf-program",
        "SPoo1Ku8WFXoNDMHPsrGSTSG1Y47rzgn41SLUNakuHy",
        "/test-fixtures/programs/stake-pool.so",
        # Features
        "--deactivate-feature",
        "9onWzzvCzNC2jfhxxeqRgs5q7nFAAKpCUvkj6T6GJK9i", # deactivate 1 SOL minimum delegation stake
      ]
    volumes:
      - ./test-fixtures:/test-fixtures
    ports:
      - "8899:8899" # http rpc
      - "8900:8900" # websocket rpc
